spring.application.name=api.gateway

server.port=8085

# spring.datasource.url=jdbc:mysql://localhost:3306/persistent_login_db?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=${DATA_BASE_PASSWORD}
spring.datasource.url=jdbc:postgresql://localhost:5432/persistent_login_db?sslmode=disable
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=${DATA_BASE_PASSWORD}

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.connect-timeout=1500
spring.data.redis.timeout=1500
spring.data.redis.password=${REDIS_PASSWORD}

app.security.jwt.secret-key=${JWT_SECRET_KEY}
app.security.remember-me-key=${REMEMBER_ME_KEY}

user_service_url=http://localhost:8086
booking_service_url=http://localhost:8087

spring.servlet.multipart.enabled=false

