<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset='utf-8'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="stylesheet" th:href="@{/auth/css/auth.css}">
    <link rel="stylesheet" th:href="@{/common/css/header.css}">
</head>

<body>

    <header th:replace="~{/common/header.html}"></header>

    <div class="auth-form-container">
        <div class="sign-in-form-container active">
            <h2>Вхід</h2>
            <form id="sign-in-form" th:action="@{/sign_in}" method="post">
                <input type="text" name="username" placeholder="Login" required>
                <input type="password" name="password" placeholder="Password" required>
                <span class="error-span"></span>
                <button type="submit" class="btn-submit">Увійти</button>
            </form>
            <p><span class="registration-link">Реєстрація</span></p>
        </div>

        <div class="sign-up-form-container">
            <h2>Реєстрація</h2>
            <form id="sign-up-form" th:action="@{/sign_up}" method="post">
                <input type="text" name="login" placeholder="Login" minlength="4" required>
                <input type="password" name="password" placeholder="Password"
                    pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$" required>
                <span class="error-span"></span>
                <button type="submit" class="btn-submit">Зареєструватися</button>
            </form>
            <p><span class="login-link">Вхід</span></p>
        </div>
    </div>


</body>
<script th:src="@{/auth/js/auth.js}"></script>
<script th:src="@{/common/js/header.js}"></script>

</html>
