spring.application.name=demo_hotel_service

server.port=8087

spring.datasource.url=jdbc:mysql://localhost:3306/java_hotel_booking_service_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=${DATA_BASE_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=20


app.security.jwt.secret-key=${JWT_SECRET_KEY}

    
image_storage.uploads.url=/uploads/
image_storage.uploads.dir=${user.home}/hotel-uploads/
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=200MB


spring.cloud.openfeign.client.config.resource-service.url: http://localhost:8088
spring.cloud.openfeign.client.config.user-service.url: http://localhost:8086


