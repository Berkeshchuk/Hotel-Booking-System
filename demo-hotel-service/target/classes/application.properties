spring.application.name=demo_hotel_service

server.port=8087

spring.datasource.url=jdbc:mysql://localhost:3306/java_hotel_booking_service_db?useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.username=root
spring.datasource.password=admin

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=100

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.connect-timeout=5000
spring.data.redis.password=${REDIS_PASSWORD}

app.security.jwt.secret-key=${JWT_SECRET_KEY}

    
image_storage.uploads.url=/uploads/
image_storage.uploads.dir=${user.home}/hotel-uploads/
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=200MB


