spring.application.name=demo_resource_service

server.port=8088

spring.datasource.url=jdbc:mysql://localhost:3306/java_hotel_booking_resource_service_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.username=root
spring.datasource.password=${DATA_BASE_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.security.jwt.secret-key=${JWT_SECRET_KEY}


