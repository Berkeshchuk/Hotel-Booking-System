apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: gateway
        image: api-gateway:latest
        imagePullPolicy: Never
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://localhost:5432/persistent_login_db?sslmode=disable"
        - name: SPRING_DATA_REDIS_HOST
          value: "redis-cache"
        - name: USER_SERVICE_URL
          value: "http://demo-user-service:8086"
        - name: BOOKING_SERVICE_URL
          value: "http://demo-hotel-service:8087"
        - name: DATA_BASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: edemium-credentials
              key: db-password
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: edemium-credentials
              key: jwt-secret-key
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: edemium-credentials
              key: redis-password
        - name: REMEMBER_ME_KEY
          valueFrom:
            secretKeyRef:
              name: edemium-credentials
              key: remember-me-key
        ports:
        - containerPort: 8085
        livenessProbe:
          tcpSocket:
            port: 8085
          initialDelaySeconds: 120
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 8085
          initialDelaySeconds: 120
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8085
      targetPort: 8085
      nodePort: 30085